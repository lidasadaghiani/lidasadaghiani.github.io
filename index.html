<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-iYQeCzEYFbKjA/T2uDLTpkwGzCiq6soy8tYaI1GyVh/UjpbCx/TYkiZhlZB6+fzT" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-u1OknCvxWvY5kfmNBILK2hRnQC3Pr17a+RTT6rIHI7NnikvbZlHgTPOOmMi466C8"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12 col-lg-6">
                <picture>
                    <source media="(max-width:575px)" srcset="images/1.jpg">
                    <source media="(min-width:576px) and (max-width:767px )" srcset="images/2.jpg">
                    <source media="(min-width:768px ) and (max-width:991px )" srcset="images/3.jpg">
                    <source media="(min-width:992px ) and (max-width:1199px )" srcset="images/4.jpg">
                    <source media="(min-width:1200px ) and (max-width:1399px )" srcset="images/5.jpg">
                    <img src="images/6.jpg" class="img-fluid">
                </picture>
            </div>
            <div class="col-12 bg-success col-lg-6">
                <div class="row">
                    <div class="col-12 text-end col-lg-6 w-100">
                        <h2 class="w-100">تجربه زندگی راحت تر سریع تر و به صرفه تر با سوپر اپلیکیشن اسنپ </h2>
                        <p class="w-100">از درخواست خودرو گرفته تا سفارش غذاخرید سوپر مارکتی خرید بلیط سفر مشاوره پزشکی
                            و
                            روانشناسی رزرو هتل
                            را میتوانید با سوپر اپلیکیشن اسنپ انجام دهید</p>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12  col-lg-6">
                        <button class="btn btn-light w-100">دانلود اپلیکیشن اسنپ</button>
                    </div>
                    <div class="col-lg-6">
                        <div class="d-none">
                            <input type="text" class="form-control" id="exampleFormControlInput1"
                                placeholder="09xxxx6789">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-lg-12">
                        <button class="btn btn-light d-none">ورود به وب اپلیکیشن اسنپ</button>
                    </div>
                </div>
            </div>


        </div>
    </div>

</html>
